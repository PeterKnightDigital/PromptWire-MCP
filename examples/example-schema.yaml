# Example PW-MCP Schema Export
# Generated by: php bin/pw-mcp.php export-schema --format=yaml

meta:
  exportedAt: "2026-01-29T12:00:00+00:00"
  pwVersion: "3.0.229"
  siteName: example-site.local

fields:
  title:
    type: FieldtypePageTitle
    inputfield: InputfieldPageTitle
    label: Title
    required: true
    settings:
      maxlength: 255

  body:
    type: FieldtypeTextarea
    inputfield: InputfieldCKEditor
    label: Body
    description: Main content area
    settings:
      rows: 10
      contentType: 1

  summary:
    type: FieldtypeTextarea
    inputfield: InputfieldTextarea
    label: Summary
    settings:
      rows: 3
      maxlength: 500

  images:
    type: FieldtypeImage
    inputfield: InputfieldImage
    label: Images
    settings:
      maxFiles: 0
      extensions: "jpg jpeg png gif webp"

  sidebar:
    type: FieldtypePage
    inputfield: InputfieldPageListSelect
    label: Sidebar Content
    settings:
      template: sidebar-block
      derefAsPage: true

templates:
  home:
    label: Home
    fields:
      - title
      - body
      - images
    family:
      allowChildren: true
      childTemplates:
        - basic-page
        - blog-post

  basic-page:
    label: Basic Page
    fields:
      - title
      - body
      - summary
      - sidebar
    family:
      allowChildren: true
      allowPageNum: false

  blog-post:
    label: Blog Post
    fields:
      - title
      - body
      - summary
      - images
    family:
      allowChildren: false
    access:
      useRoles: true
      roles:
        view:
          - guest
          - editor
        edit:
          - editor
